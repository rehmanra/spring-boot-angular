version: '3'

services:
  postgres:
    image: postgres:13.1
    container_name: springbootangular-postgres-db
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "postgres", "-U", "root" ]
      timeout: 45s
      interval: 10s
      retries: 10
    restart: always
    env_file:
      - .env
    volumes:
      - ./db:/docker-entrypoint-initdb.d/
    ports:
      - 5432:5432